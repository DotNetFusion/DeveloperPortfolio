<section id="hero" class="hero">
  <div class="container">
    <div class="hero-content">
      <div class="hero-text">
        <div class="hero-greeting">
          <span class="greeting-wave">👋</span>
          <span>Hi, I'm</span>
        </div>
        <h1 class="hero-title">
          {{ developer()?.name }}
        </h1>
        <p class="hero-tagline">
          {{ developer()?.tagline }}
        </p>
        <p class="hero-description">
          {{ developer()?.summary }}
        </p>
        <div class="hero-cta">
          <button class="btn btn-primary" (click)="scrollToProjects()">
            View My Work
            <span>→</span>
          </button>
          <a [href]="'mailto:' + developer()?.email" class="btn btn-secondary">
            Get In Touch
          </a>
        </div>
      </div>

      <div class="hero-image">
        <div class="image-wrapper">
          <img
            src="../../img/profile.png"
            [alt]="developer()?.name"
            width="300"
            height="300"
            class="profile-image" />
          <div class="image-border"></div>
        </div>
      </div>
    </div>

    <div class="hero-scroll">
      <span>Scroll to explore</span>
      <div class="scroll-arrow">
        <div class="arrow"></div>
        <div class="arrow"></div>
      </div>
    </div>
  </div>
</section>
