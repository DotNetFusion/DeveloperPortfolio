<section id="hero" class="hero">
  <div class="container">
    <div class="hero-content">
      <div class="hero-text">
        <div class="hero-greeting">
          <span class="greeting-wave">👋</span>
          <span>Hi, I'm</span>
        </div>
        <h1 class="hero-title">
          {{ developer()?.name }}
        </h1>
        <p class="hero-tagline">
          {{ developer()?.tagline }}
        </p>
        <p class="hero-description">
          {{ developer()?.summary }}
        </p>
        <div class="hero-cta">
          <button class="btn btn-primary" (click)="scrollToProjects()">
            View My Work
            <span>→</span>
          </button>
          <a [href]="'mailto:' + developer()?.email" class="btn btn-secondary">
            Get In Touch
          </a>
        </div>
      </div>

      <div class="hero-image">
        <div class="image-wrapper">
          <img
            src="https://media.licdn.com/dms/image/v2/D5603AQE-a6ViN_Gbkg/profile-displayphoto-scale_400_400/B56Zy.3mxXIcAg-/0/1772728776114?e=1774483200&v=beta&t=6f4yiHlpGxV6SA_bDULWm9bCHipmxEgejEdvaUNadKA"
            [alt]="developer()?.name"
             
            class="profile-image" />
          <div class="image-border"></div>
        </div>
      </div>
    </div>

    <div class="hero-scroll">
      <span>Scroll to explore</span>
      <div class="scroll-arrow">
        <div class="arrow"></div>
        <div class="arrow"></div>
      </div>
    </div>
  </div>
</section>
