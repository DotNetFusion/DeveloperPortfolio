<section id="projects" class="projects section">
  <div class="container">
    <h2 class="section-title">Featured Projects</h2>

    <div class="projects-grid">
      <div *ngFor="let project of projects(); let i = index" class="project-card" [style.animation-delay]="i * 100 + 'ms'">
        <div class="project-header">
          <div class="project-icon">
            <span>{{ i + 1 }}</span>
          </div>
          <div class="project-links">
            <a [href]="project.github" target="_blank" rel="noopener noreferrer" class="project-link" title="View on GitHub">
              <span>GitHub</span>
              <i class="icon-github"></i>
            </a>
            <a [href]="project.liveUrl" target="_blank" rel="noopener noreferrer" class="project-link" title="View Live">
              <span>Live</span>
              <i class="icon-external"></i>
            </a>
          </div>
        </div>

        <div class="project-content">
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>

          <div class="project-tech">
            <span *ngFor="let tech of project.techStack" class="tech-badge">
              {{ tech }}
            </span>
          </div>
        </div>

        <div class="project-footer">
          <button class="btn btn-secondary" [attr.aria-label]="'Learn more about ' + project.title">
            Learn More
            <span>→</span>
          </button>
        </div>
      </div>
    </div>

    <div class="projects-cta">
      <p>Interested in seeing more projects?</p>
      <a href="https://github.com/DotNetFusion" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
        Visit GitHub Profile
      </a>
    </div>
  </div>
</section>
